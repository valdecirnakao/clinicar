# ===============================
# BANCO DE DADOS - MYSQL
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/clinicar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo


# ===============================
# WHATSAPP CLOUD API - META
# ===============================

whatsapp.api-url=https://graph.facebook.com/v25.0
whatsapp.phone-number-id=1201734063014593
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN}

# Template padrão, usado no método enviarMensagemTemplate()
whatsapp.template-name=cadastro_usuario

# Template usado no cadastro de veículo
whatsapp.template-cadastro-veiculo-name=cadastro_veiculo

# Idioma aprovado nos templates
whatsapp.template-language=pt_BR

# ===============================
# EMAIL - GMAIL SMTP
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_APP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URL do frontend Angular
clinicar.frontend-url=http://localhost:4200