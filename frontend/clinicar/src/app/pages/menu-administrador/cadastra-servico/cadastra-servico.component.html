<div class="container-fluid mt-0 mb-0" style="color:#35689b;">
  <div class="row justify-content-center">
    <div class="col-md-12 sm-mt-0">
      <!-- Título -->
      <div class="row mt-0">
        <div class="col text-center mb-2">
          <div class="card" style="border:1px solid #d0e2f2;border-radius:3px;background:#eef6ff;">
            <div class="card-body" style="color:#35689b;">Cadastro de Serviços</div>
          </div>
        </div>
      </div>

      <form #form="ngForm" (ngSubmit)="cadastrar(form)">
        <div class="row">
          <!-- Descrição do Serviço -->
          <div class="col-md-5 mb-2">
            <label for="descricao" class="form-label">Descrição do Serviço</label>
            <input id="descricao" name="descricao" class="form-control"
                   required [(ngModel)]="servico.descricao"
                   autocomplete="off"
                   style="color:#35689b;">
          </div>

          <!-- Tipo do Prestador -->
          <div class="col-md-2 mb-2">
            <label for="tipoPrestador" class="form-label">Tipo do Prestador</label>
            <input id="tipoPrestador" name="tipoPrestador" class="form-control"
                   required [(ngModel)]="servico.tipoDoPrestador" style="color:#35689b;">
          </div>


          <!-- Duração -->
          <div class="col-md-1 mb-2">
            <label for="duracao" class="form-label">Duração</label>
            <input id="duracao" name="duracao" class="form-control"
                   required [(ngModel)]="servico.duracao" style="color:#35689b;">
          </div>


          <!-- Unidade -->
          <div class="col-md-2 mb-2">
            <label for="unidade" class="form-label">Unidade</label>
            <input id="unidade" name="unidade" class="form-control"
                   [(ngModel)]="servico.unidade" style="color:#35689b;">
          </div>


          <!-- CNPJ do Fornecedor (dropdown com busca) -->
          <div class="col-md-2 mb-2">
            <label for="cnpjFornecedor" class="form-label">CNPJ do Fornecedor</label>
            <!-- INPUT de exibição/ativação -->
            <div class="position-relative cnpj-picker">
              <input
                id="cnpjFornecedor"
                class="form-control"
                [value]="cnpjDisplay || ''"
                (click)="toggleDropdown(true)"
                placeholder="Selecione um CNPJ"
                readonly
                style="color:#35689b; background:#fff; cursor:pointer;"/>
              <!-- Dropdown -->
              <div class="cnpj-dropdown shadow-sm" *ngIf="dropdownOpen">
                <!-- Barra de pesquisa -->
                <div class="p-2 border-bottom" style="background:#f8fbff;">
                  <input type="search" class="form-control form-control-sm"
                         placeholder="Buscar por CNPJ, nome ou e-mail"
                         [(ngModel)]="cnpjFiltro" name="cnpjFiltro"
                         (input)="aplicarFiltro()">
                </div>

                <!-- Lista rolável -->
                <div class="cnpj-list">
                  <button type="button"
                          class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                          *ngFor="let f of fornecedoresFiltrados; trackBy: trackByFornecedor"
                          (click)="selecionarFornecedor(f)">
                    <span class="fw-semibold">{{ formatarCNPJ(f.cnpj) }}</span>
                    <small class="text-muted text-truncate ms-2">{{ f.nomeFantasia }}</small>
                  </button>

                  <div class="px-3 py-2 text-muted small" *ngIf="fornecedoresFiltrados.length === 0">
                    Nenhum fornecedor encontrado.
                  </div>
                </div>
              </div>
            </div>

            <!-- Feedback seleção -->
            <div class="form-text" *ngIf="servico.idFornecedor">
              Selecionado: {{ nomeFornecedorSelecionado }}
            </div>
            <div class="text-danger small" *ngIf="cnpjErro">{{ cnpjErro }}</div>
          </div>

        </div>


          <!-- Ações -->
          <div class="col-12 d-flex gap-2 justify-content-center mt-2">
            <button type="submit" class="btn btn-success" [disabled]="!servico.idFornecedor">
              Cadastrar Serviço
            </button>
            <button type="button" class="btn btn-secondary" (click)="form.resetForm(); resetarModelo();">
              Limpar
            </button>
          </div>
      </form>
      <!-- Tabela de apoio (opcional) -->
      <div class="mt-4">
        <div class="table-responsive">
          <table class="table align-middle table-hover text-nowrap" style="border-color:#d0e2f2;">
            <thead style="background:#eef6ff;color:#35689b;">
              <tr>
                <th>CNPJ</th>
                <th>Razão Social</th>
                <th>Nome Fantasia</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th class="text-center">Ação</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let f of fornecedoresFiltrados; trackBy: trackByFornecedor">
                <td>{{ formatarCNPJ(f.cnpj) }}</td>
                <td class="text-truncate" style="max-width:260px;">{{ f.razaoSocial }}</td>
                <td class="text-truncate" style="max-width:260px;">{{ f.nomeFantasia }}</td>
                <td class="text-truncate" style="max-width:260px;">{{ f.email }}</td>
                <td class="text-truncate" style="max-width:180px;">{{ f.telefone }}</td>
                <td class="text-center">
                  <button class="btn btn-sm btn-outline-primary"
                          (click)="selecionarFornecedor(f)"
                          style="border-color:#8fb4da;color:#35689b;">
                    Selecionar este Fornecedor
                  </button>
                </td>
              </tr>
              <tr *ngIf="!fornecedoresFiltrados || fornecedoresFiltrados.length === 0">
                <td colspan="5" class="text-center text-muted py-3">
                  Nenhum fornecedor encontrado.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .cpf-picker { position: relative; }
  .cpf-dropdown {
    position: absolute;
    inset: auto 0 0 0; /* 100% width do input */
    transform: translateY(2px);
    background: #fff;
    border: 1px solid #d0e2f2;
    border-radius: .25rem;
    z-index: 2000;
  }
  .cpf-list {
    max-height: 280px;
    overflow: auto;
  }
  .list-group-item {
    border: none;
  }
  .form-control:focus, .btn:focus {
    box-shadow: 0 0 0 .2rem rgba(53,104,155,.15);
    border-color: #8fb4da;
  }
</style>
